apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15.0
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          value: "Pg#123"
        - name: POSTGRES_USER
          value: "kubenews"  
        - name:  POSTGRES_DB
          value: "kubenews"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "kubenews"
spec:
  selector:
    matchLabels:
      app: "kubenews"
  template:
    metadata:
      labels:
        app: "kubenews"
    spec:
      containers:
      - name: "kubenews"
        image: nevetas/kubenews
        ports:
        - containerPort: 8080
        env:
        - name: DB_DATABASE
          value: "kubenews"
        - name: DB_USERNAME
          value: "kubenews"
        - name: DB_PASSWORD
          value: "Pg#123"
        - name : DB_HOST
          value: postgres    #deve ser o selector que aponta pro postgres
---
apiVersion: v1
kind: Service
metadata:
  name: kubenews
spec:
  selector:
    app: kubenews
  ports:
  - port: 80  #preciso entender isso melhor
    targetPort: 8080
    nodePort: 30000 # quale disso mesmo?  acho que tem que bater com a porta do meu k8s
  type: NodePort 
  # preciso entender melhor como o K3D funciona com relacao as portas. foi o que eu mais me bati
